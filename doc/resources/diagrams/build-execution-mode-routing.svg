<?xml version="1.0" encoding="UTF-8"?>
<!--
  Build-execute routing by execution mode (D5 build-server client API).

  theme-handling: A (theme-neutral)
  see  pm-documents:ref-svg-diagrams/standards/theme-handling.md

  A branching flow: the three requested execution modes (auto, in_process,
  daemon) enter on the left, resolve at the central cmd_run routing decision,
  and reach one of three resolved outcomes on the right (daemon-served,
  in-process, fail-loud). in_process bypasses the decision entirely on the
  bottom track; the in-process outcome is a convergence reached both directly
  and via the auto-fallback / daemon-child path.
  See  pm-documents:ref-svg-diagrams/standards/diagram-type-flow.md
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 440"
     role="img" aria-labelledby="title desc"
     font-family="ui-sans-serif, -apple-system, system-ui, 'Segoe UI', sans-serif">
  <title id="title">Build-execute routing by execution mode</title>
  <desc id="desc">A branching flow diagram. On the left, three requested execution modes are stacked as entry stages: auto, in_process, and daemon. auto and daemon flow into a central diamond labelled cmd_run routing decision — the requested-versus-resolved junction. The decision fans out to three resolved outcomes on the right: daemon-served (routed) when the daemon is ready, fail-loud (ERROR_DAEMON_REQUIRED) when daemon mode cannot route, and in-process (fallback slot) for an auto fallback or an in_daemon_job child. The in_process mode bypasses the decision on a straight bottom track and always converges on the in-process outcome.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" class="arrow-fill"/>
    </marker>
    <style>
      .col-lbl      { font-size: 13px; font-weight: 600; fill: #6e7681; text-anchor: middle; font-style: italic; }
      .stage-header { font-size: 14px; font-weight: 600; fill: #6e7681; text-anchor: middle; }
      .stage-sub    { font-size: 11px; fill: #6e7681; text-anchor: middle; font-style: italic; }
      .decision-lbl { font-size: 13px; font-weight: 600; fill: #6e7681; text-anchor: middle; }
      .edge-lbl     { font-size: 11px; fill: #6e7681; text-anchor: middle; font-style: italic; }
      .stage        { stroke: #6e7681; stroke-width: 1.2; fill: none; }
      .track        { stroke: #6e7681; stroke-width: 1.5; fill: none; }
      .arrow-fill   { fill: #6e7681; }
      .caption      { font-size: 12px; fill: #6e7681; text-anchor: middle; font-style: italic; }
    </style>
  </defs>

  <!-- Column headers -->
  <text x="127" y="42" class="col-lbl">requested mode</text>
  <text x="1002" y="42" class="col-lbl">resolved outcome</text>

  <!-- ============================================================ -->
  <!-- LEFT — requested modes                                        -->
  <!-- ============================================================ -->
  <!-- auto -->
  <rect class="stage" x="50" y="71" width="155" height="52" rx="6" ry="6"/>
  <text x="127" y="94" class="stage-header">auto</text>
  <text x="127" y="112" class="stage-sub">default</text>

  <!-- daemon -->
  <rect class="stage" x="50" y="171" width="155" height="52" rx="6" ry="6"/>
  <text x="127" y="194" class="stage-header">daemon</text>
  <text x="127" y="212" class="stage-sub">require the daemon</text>

  <!-- in_process -->
  <rect class="stage" x="50" y="317" width="155" height="52" rx="6" ry="6"/>
  <text x="127" y="340" class="stage-header">in_process</text>
  <text x="127" y="358" class="stage-sub">never route</text>

  <!-- ============================================================ -->
  <!-- CENTRE — the cmd_run routing decision (requested→resolved)    -->
  <!-- Diamond: top (565,98) right (655,150) bottom (565,202)        -->
  <!--          left (475,150)                                       -->
  <!-- ============================================================ -->
  <polygon class="stage" points="565,98 655,150 565,202 475,150"/>
  <text x="565" y="146" class="decision-lbl">cmd_run</text>
  <text x="565" y="162" class="decision-lbl">routing</text>

  <!-- auto → decision (upper-left edge) -->
  <line class="track" x1="205" y1="97" x2="502" y2="134" marker-end="url(#arrow)"/>
  <text x="352" y="103" class="edge-lbl">route opportunistically</text>

  <!-- daemon → decision (lower-left edge) -->
  <line class="track" x1="205" y1="197" x2="502" y2="166" marker-end="url(#arrow)"/>
  <text x="352" y="192" class="edge-lbl">require daemon</text>

  <!-- ============================================================ -->
  <!-- BOTTOM TRACK — in_process bypasses the decision entirely      -->
  <!-- ============================================================ -->
  <line class="track" x1="205" y1="343" x2="915" y2="343" marker-end="url(#arrow)"/>
  <text x="560" y="333" class="edge-lbl">bypasses routing — always in-process</text>

  <!-- ============================================================ -->
  <!-- RIGHT — resolved outcomes                                     -->
  <!-- ============================================================ -->
  <!-- daemon-served -->
  <rect class="stage" x="915" y="71" width="175" height="52" rx="6" ry="6"/>
  <text x="1002" y="94" class="stage-header">daemon-served</text>
  <text x="1002" y="112" class="stage-sub">routed</text>

  <!-- fail-loud -->
  <rect class="stage" x="915" y="171" width="175" height="52" rx="6" ry="6"/>
  <text x="1002" y="194" class="stage-header">fail-loud</text>
  <text x="1002" y="212" class="stage-sub">ERROR_DAEMON_REQUIRED</text>

  <!-- in-process -->
  <rect class="stage" x="915" y="317" width="175" height="52" rx="6" ry="6"/>
  <text x="1002" y="340" class="stage-header">in-process</text>
  <text x="1002" y="358" class="stage-sub">fallback slot</text>

  <!-- decision → daemon-served -->
  <line class="track" x1="655" y1="150" x2="915" y2="97" marker-end="url(#arrow)"/>
  <text x="785" y="108" class="edge-lbl">daemon ready</text>

  <!-- decision → fail-loud -->
  <line class="track" x1="655" y1="150" x2="915" y2="197" marker-end="url(#arrow)"/>
  <text x="792" y="168" class="edge-lbl">daemon mode: unavailable</text>

  <!-- decision → in-process (auto fallback / daemon child) -->
  <line class="track" x1="655" y1="150" x2="915" y2="330" marker-end="url(#arrow)"/>
  <text x="742" y="262" class="edge-lbl">auto fallback /</text>
  <text x="742" y="277" class="edge-lbl">in_daemon_job child</text>

  <!-- ============================================================ -->
  <!-- Footer caption                                                -->
  <!-- ============================================================ -->
  <text x="560" y="418" class="caption">Requested mode resolves at the cmd_run routing decision to a daemon-served, in-process, or fail-loud outcome.</text>

</svg>
