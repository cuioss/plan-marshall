<?xml version="1.0" encoding="UTF-8"?>
<!--
  Sequence diagram skeleton — three actors, time flowing downward.

  theme-handling: A (theme-neutral)
  see  pm-documents:ref-svg-diagrams/standards/theme-handling.md

  Each actor has a header box and a dashed lifeline. Solid arrows are
  requests/calls; dashed arrows (.arrow-return) are responses/returns.
  Activation bars (.activation) mark the period an actor holds the flow
  of control; a "waiting" note marks a caller suspended during a call.
  Replace title / desc / actor names / message labels.
  See  pm-documents:ref-svg-diagrams/standards/diagram-type-sequence.md
  for placement conventions.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540"
     role="img" aria-labelledby="title desc"
     font-family="ui-sans-serif, -apple-system, system-ui, 'Segoe UI', sans-serif">
  <title id="title">PLACEHOLDER — {caller} dispatches {operation}, synchronous flow</title>
  <desc  id="desc">PLACEHOLDER — paragraph describing the time-ordered exchange: which actor calls which, the order of messages, and which actor waits while another works</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" class="arrow-fill"/>
    </marker>
    <style>
      .col-header   { font-size: 15px; font-weight: 600; fill: #6e7681; text-anchor: middle; }
      .stroke       { stroke: #6e7681; stroke-width: 1.2; fill: none; }
      .sep          { stroke: #6e7681; stroke-width: 0.6; stroke-dasharray: 3 3; }
      .arrow        { stroke: #6e7681; stroke-width: 1.5; fill: none; }
      .arrow-return { stroke: #6e7681; stroke-width: 1.5; fill: none; stroke-dasharray: 5 4; }
      .arrow-fill   { fill: #6e7681; }
      .arrow-lbl    { font-size: 11px; fill: #6e7681; text-anchor: middle; font-style: italic; }
      .activation   { stroke: #6e7681; stroke-width: 0.8; fill: #6e7681; opacity: 0.15; }
      .col-sub      { font-size: 11px; fill: #6e7681; text-anchor: middle; font-style: italic; }
      .caption      { font-size: 12px; fill: #6e7681; text-anchor: middle; font-style: italic; }
    </style>
  </defs>

  <!-- ===================== ACTORS + LIFELINES ===================== -->
  <text x="150" y="30" class="col-header">actor A</text>
  <rect class="stroke" x="90" y="42" width="120" height="36" rx="6" ry="6"/>
  <line class="sep" x1="150" y1="80" x2="150" y2="500"/>

  <text x="450" y="30" class="col-header">actor B</text>
  <rect class="stroke" x="390" y="42" width="120" height="36" rx="6" ry="6"/>
  <line class="sep" x1="450" y1="80" x2="450" y2="500"/>

  <text x="750" y="30" class="col-header">actor C</text>
  <rect class="stroke" x="690" y="42" width="120" height="36" rx="6" ry="6"/>
  <line class="sep" x1="750" y1="80" x2="750" y2="500"/>

  <!-- ===================== ACTIVATION BARS ===================== -->
  <!-- B holds the flow of control from its inbound request to its return -->
  <rect class="activation" x="445" y="130" width="10" height="160"/>
  <!-- C is active only for the short sub-call -->
  <rect class="activation" x="745" y="180" width="10" height="60"/>

  <!-- ===================== MESSAGES (time flows down) ===================== -->
  <!-- request A -> B -->
  <line class="arrow" x1="150" y1="130" x2="445" y2="130" marker-end="url(#arrow)"/>
  <text x="298" y="122" class="arrow-lbl">request</text>

  <!-- caller A suspended while B works (plain text — emoji glyphs do not theme-adapt) -->
  <text x="298" y="210" class="col-sub">A suspended</text>

  <!-- sub-call B -> C -->
  <line class="arrow" x1="455" y1="180" x2="745" y2="180" marker-end="url(#arrow)"/>
  <text x="600" y="172" class="arrow-lbl">sub-call</text>

  <!-- return C -> B (dashed) -->
  <line class="arrow-return" x1="745" y1="240" x2="455" y2="240" marker-end="url(#arrow)"/>
  <text x="600" y="232" class="arrow-lbl">result</text>

  <!-- return B -> A (dashed) -->
  <line class="arrow-return" x1="445" y1="290" x2="150" y2="290" marker-end="url(#arrow)"/>
  <text x="298" y="282" class="arrow-lbl">response</text>

  <!-- ===================== Footer caption ===================== -->
  <text x="450" y="524" class="caption">Time flows downward; solid arrows are calls, dashed arrows are returns; bars show who holds control.</text>
</svg>
