<?xml version="1.0" encoding="UTF-8"?>
<!--
  Plan worktree topology — shared repository + N independent working trees.

  theme-handling: A (theme-neutral)
  see  pm-documents:ref-svg-diagrams/standards/theme-handling.md

  Three-column block diagram. Left column: developer's main checkout.
  Middle column: the shared .git directory (commits, refs, objects). Right
  column: a stack of plan worktrees, each on its own feature branch. Arrows
  in both gutters show every working tree reading and writing to the same
  .git. The footer caption names the load-bearing idea: many working trees,
  one repository.

  diagram-type-block reference standard:
  pm-documents:ref-svg-diagrams/standards/diagram-type-block.md
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     role="img" aria-labelledby="title desc"
     font-family="ui-sans-serif, -apple-system, system-ui, 'Segoe UI', sans-serif">
  <title id="title">Plan Marshall worktree topology</title>
  <desc id="desc">A three-column block diagram showing how Plan Marshall pairs each plan with its own git worktree and feature branch while all worktrees share one underlying repository. The developer's main checkout sits on the left, the shared .git directory (commits, refs, objects, hooks) sits in the middle, and a stack of three example plan worktrees on their own feature branches sits on the right. Bi-directional arrows in both gutters indicate that every working tree reads from and writes to the same .git.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" class="arrow-fill"/>
    </marker>
    <style>
      .col-header { font-size: 15px; font-weight: 600; fill: #6e7681; text-anchor: middle; }
      .col-sub    { font-size: 11px; fill: #6e7681; text-anchor: middle; font-style: italic; }
      .item       { font-size: 12px; fill: #6e7681; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
      .item-bold  { font-size: 12px; fill: #6e7681; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-weight: 700; }
      .item-c     { font-size: 12px; fill: #6e7681; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; text-anchor: middle; }
      .arrow-lbl  { font-size: 11px; fill: #6e7681; text-anchor: middle; font-style: italic; }
      .stroke     { stroke: #6e7681; stroke-width: 1.2; fill: none; }
      .arrow      { stroke: #6e7681; stroke-width: 1.5; fill: none; }
      .arrow-fill { fill: #6e7681; }
      .sep        { stroke: #6e7681; stroke-width: 0.6; stroke-dasharray: 3 3; }
      .caption    { font-size: 12px; fill: #6e7681; text-anchor: middle; font-style: italic; }
    </style>
  </defs>

  <!-- ============================================================ -->
  <!-- COLUMN 1 (left) — developer's main checkout                  -->
  <!-- ============================================================ -->
  <text x="150" y="28" class="col-header">MAIN CHECKOUT</text>
  <text x="150" y="44" class="col-sub">developer's working tree</text>
  <rect class="stroke" x="20" y="60" width="260" height="380" rx="6" ry="6"/>

  <text x="150" y="100" class="item-c">branch: main</text>
  <text x="150" y="125" class="item-c">HEAD = origin/main</text>
  <line class="sep" x1="60" y1="150" x2="240" y2="150"/>
  <text x="36"  y="184" class="item-bold">role</text>
  <text x="36"  y="204" class="item">review PRs</text>
  <text x="36"  y="224" class="item">ad-hoc commands</text>
  <text x="36"  y="244" class="item">read mainline state</text>
  <line class="sep" x1="60" y1="270" x2="240" y2="270"/>
  <text x="36"  y="304" class="item-bold">never edited</text>
  <text x="36"  y="324" class="item">by Plan Marshall</text>

  <text x="150" y="420" class="col-sub">untouched while plans run</text>

  <!-- ============================================================ -->
  <!-- COLUMN 2 (middle) — shared .git                              -->
  <!-- ============================================================ -->
  <text x="450" y="28" class="col-header">SHARED REPOSITORY</text>
  <text x="450" y="44" class="col-sub">.git directory</text>
  <rect class="stroke" x="320" y="60" width="260" height="380" rx="6" ry="6"/>

  <text x="450" y="100" class="item-c">commits</text>
  <text x="450" y="125" class="item-c">refs (branches, tags)</text>
  <text x="450" y="150" class="item-c">objects (blobs, trees)</text>
  <text x="450" y="175" class="item-c">hooks</text>
  <line class="sep" x1="360" y1="200" x2="540" y2="200"/>
  <text x="450" y="234" class="item-c">single source of</text>
  <text x="450" y="254" class="item-c">history for everyone</text>

  <text x="450" y="420" class="col-sub">one directory, shared by all working trees</text>

  <!-- ============================================================ -->
  <!-- COLUMN 3 (right) — plan worktrees                            -->
  <!-- ============================================================ -->
  <text x="750" y="28" class="col-header">PLAN WORKTREES</text>
  <text x="750" y="44" class="col-sub">in flight</text>
  <rect class="stroke" x="620" y="60" width="260" height="380" rx="6" ry="6"/>

  <!-- three stacked worktree boxes -->
  <rect class="stroke" x="636" y="84" width="228" height="74" rx="4" ry="4"/>
  <text x="750" y="106" class="item-c">worktree: plan-a</text>
  <text x="750" y="128" class="item-c">branch: feature/plan-a</text>
  <text x="750" y="148" class="col-sub">isolated working tree</text>

  <rect class="stroke" x="636" y="174" width="228" height="74" rx="4" ry="4"/>
  <text x="750" y="196" class="item-c">worktree: plan-b</text>
  <text x="750" y="218" class="item-c">branch: feature/plan-b</text>
  <text x="750" y="238" class="col-sub">isolated working tree</text>

  <rect class="stroke" x="636" y="264" width="228" height="74" rx="4" ry="4"/>
  <text x="750" y="286" class="item-c">worktree: plan-c</text>
  <text x="750" y="308" class="item-c">branch: feature/plan-c</text>
  <text x="750" y="328" class="col-sub">isolated working tree</text>

  <text x="750" y="420" class="col-sub">one per plan; concurrent and independent</text>

  <!-- ============================================================ -->
  <!-- Arrows between columns (bi-directional pairs)                -->
  <!-- ============================================================ -->

  <!-- main checkout ↔ shared repo -->
  <line class="arrow" x1="280" y1="225" x2="316" y2="225" marker-end="url(#arrow)"/>
  <text x="298" y="217" class="arrow-lbl">writes</text>
  <line class="arrow" x1="316" y1="260" x2="280" y2="260" marker-end="url(#arrow)"/>
  <text x="298" y="252" class="arrow-lbl">reads</text>

  <!-- shared repo ↔ plan worktrees -->
  <line class="arrow" x1="584" y1="225" x2="616" y2="225" marker-end="url(#arrow)"/>
  <text x="600" y="217" class="arrow-lbl">reads</text>
  <line class="arrow" x1="616" y1="260" x2="584" y2="260" marker-end="url(#arrow)"/>
  <text x="600" y="252" class="arrow-lbl">writes</text>

  <!-- ============================================================ -->
  <!-- Footer caption (whole-diagram)                                -->
  <!-- ============================================================ -->
  <text x="450" y="478" class="caption">Many working trees, one repository — commits and refs are shared; the working files are not.</text>

</svg>
