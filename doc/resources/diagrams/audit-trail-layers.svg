<?xml version="1.0" encoding="UTF-8"?>
<!--
  Audit trail layers — three telemetry layers (logs, structured
  artefacts, findings) feeding plan-retrospective as the consumer.
  Drawn as a literal stack: three horizontal slabs of asymmetric
  heights (reflecting content density), dashed inter-slab dividers,
  three convergent connectors to plan-retrospective on the right.

  theme-handling: A (theme-neutral)
  see  pm-documents:ref-svg-diagrams/standards/theme-handling.md

  diagram-type-stack reference standard:
  pm-documents:ref-svg-diagrams/standards/diagram-type-stack.md
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 480"
     role="img" aria-labelledby="title desc"
     font-family="ui-sans-serif, -apple-system, system-ui, 'Segoe UI', sans-serif">
  <title id="title">Audit trail layers</title>
  <desc id="desc">A layered-stack diagram showing the three telemetry layers Plan Marshall records on disk for every plan. The top slab is Logs (line-oriented streams: work.log, decision.log, script-execution.log) — slim because there are only three files. The middle slab is Structured Artifacts (the per-plan document set: request.md, solution_outline.md, tasks/TASK-N.json, references.json, status.json, execution.toon, handshakes.toon, metrics.md) — wider because there are eight named artefacts. The bottom slab is Findings (per-type JSONL stores) — also wide, with one row per finding type. Each slab is separated from the next by a dashed horizontal divider. To the right of the stack, vertically centred, is the plan-retrospective consumer node, with three convergent connector lines reaching out from the right edge of each slab to its left side.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" class="arrow-fill"/>
    </marker>
    <style>
      .layer-header   { font-size: 15px; font-weight: 600; fill: #6e7681; text-anchor: start; }
      .layer-sub      { font-size: 11px; fill: #6e7681; text-anchor: start; font-style: italic; }
      .item           { font-size: 12px; fill: #6e7681; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
      .item-sub       { font-size: 11px; fill: #6e7681; font-style: italic; }
      .slab           { stroke: #6e7681; stroke-width: 1.2; fill: none; }
      .gutter-sep     { stroke: #6e7681; stroke-width: 0.6; stroke-dasharray: 2 3; }
      .inter-divider  { stroke: #6e7681; stroke-width: 0.6; stroke-dasharray: 3 3; }
      .connector      { stroke: #6e7681; stroke-width: 1; fill: none; }
      .arrow-fill     { fill: #6e7681; }
      .consumer       { stroke: #6e7681; stroke-width: 1.4; fill: none; }
      .consumer-lbl   { font-size: 14px; font-weight: 600; fill: #6e7681; text-anchor: middle; }
      .consumer-sub   { font-size: 11px; fill: #6e7681; text-anchor: middle; font-style: italic; }
      .caption        { font-size: 12px; fill: #6e7681; text-anchor: middle; font-style: italic; }
    </style>
  </defs>

  <!-- LAYER 1 — Logs (slim) -->
  <rect class="slab" x="40" y="40" width="720" height="100" rx="6" ry="6"/>
  <line class="gutter-sep" x1="220" y1="48" x2="220" y2="132"/>
  <text x="60" y="74" class="layer-header">LOGS</text>
  <text x="60" y="92" class="layer-sub">line-oriented streams</text>
  <text x="240" y="74" class="item">work.log</text>
  <text x="240" y="94" class="item">decision.log</text>
  <text x="240" y="114" class="item">script-execution.log</text>
  <text x="240" y="132" class="item-sub">tagged by category, hash-id prefixed</text>

  <!-- Inter-slab divider -->
  <line class="inter-divider" x1="40" y1="152" x2="760" y2="152"/>

  <!-- LAYER 2 — Structured Artifacts (medium-tall) -->
  <rect class="slab" x="40" y="166" width="720" height="140" rx="6" ry="6"/>
  <line class="gutter-sep" x1="220" y1="174" x2="220" y2="298"/>
  <text x="60" y="200" class="layer-header">ARTIFACTS</text>
  <text x="60" y="218" class="layer-sub">per-plan structured docs</text>
  <text x="240" y="194" class="item">request.md</text>
  <text x="240" y="214" class="item">solution_outline.md</text>
  <text x="240" y="234" class="item">tasks/TASK-N.json</text>
  <text x="240" y="254" class="item">references.json  · status.json</text>
  <text x="240" y="274" class="item">execution.toon  · handshakes.toon</text>
  <text x="240" y="294" class="item">metrics.md</text>

  <!-- Inter-slab divider -->
  <line class="inter-divider" x1="40" y1="318" x2="760" y2="318"/>

  <!-- LAYER 3 — Findings (tall) -->
  <rect class="slab" x="40" y="332" width="720" height="110" rx="6" ry="6"/>
  <line class="gutter-sep" x1="220" y1="340" x2="220" y2="434"/>
  <text x="60" y="366" class="layer-header">FINDINGS</text>
  <text x="60" y="384" class="layer-sub">append-only JSONL</text>
  <text x="240" y="362" class="item">qgate-{phase}.jsonl  · assessments.jsonl</text>
  <text x="240" y="384" class="item">pr-comment.jsonl  · sonar-issue.jsonl</text>
  <text x="240" y="406" class="item">build-error.jsonl  · test-failure.jsonl</text>
  <text x="240" y="426" class="item-sub">hash-id deduped, resolution-tracked</text>

  <!-- CONSUMER — plan-retrospective, vertically centred on the stack -->
  <rect class="consumer" x="820" y="210" width="240" height="80" rx="6" ry="6"/>
  <text x="940" y="244" class="consumer-lbl">plan-retrospective</text>
  <text x="940" y="266" class="consumer-sub">reads all three layers</text>

  <!-- Connectors from each slab's right edge to the consumer's left edge -->
  <line class="connector" x1="760" y1="90" x2="818" y2="230" marker-end="url(#arrow)"/>
  <line class="connector" x1="760" y1="236" x2="818" y2="250" marker-end="url(#arrow)"/>
  <line class="connector" x1="760" y1="387" x2="818" y2="270" marker-end="url(#arrow)"/>

  <!-- Footer caption -->
  <text x="550" y="468" class="caption">Three telemetry layers, one retrospective consumer.</text>

</svg>
