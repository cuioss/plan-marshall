name: Python Verify

on:
  push:
    branches: [main, "feature/*", "fix/*", "chore/*", "dependabot/**"]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read
  pull-requests: read

jobs:
  verify:
    uses: cuioss/cuioss-organization/.github/workflows/reusable-pyprojectx-verify.yml@6278bbd7280a6e94b4914aa9e8c61cf23ea1abbe # v0.13.0
    with:
      # Opt in to the footprint gate: skip the heavy build+tests when every
      # changed path is non-building (docs/config). The always-reporting
      # `verify / conclusion` job still reports green on a skipped run, so the
      # required check is satisfied and the merge queue never stalls. A
      # merge_group run and any change touching buildable source still verify.
      skip-on-docs-only: true
