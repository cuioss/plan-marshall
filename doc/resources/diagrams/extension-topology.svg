<?xml version="1.0" encoding="UTF-8"?>
<!-- theme-handling: A (theme-neutral) -->
<!-- conforms to: pm-documents:ref-svg-diagrams (visual-language + diagram-type-block; core-plus-hooks variant) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620"
     role="img" aria-labelledby="title desc"
     font-family="ui-sans-serif, -apple-system, system-ui, 'Segoe UI', sans-serif">
  <title id="title">Extension topology — Plan Marshall core plus eight named extension hooks</title>
  <desc  id="desc">Plan Marshall is a core orchestrator plus six phase skills plus the execution-context dispatcher plus a family of manage-* services, extended by ten production bundles through eight named hooks: build, dynamic-level-executor, execution-context-workflow, outline, recipe, triage, provider, verify-steps, and finalize-steps. The diagram shows the core on the left and the eight hooks on the right as cards, each annotated with the ExtensionBase method name and a current implementation count. Two hooks are placeholders today (verify-steps, finalize-steps) — they declare the contract but have zero non-built-in implementations.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" class="arrow-fill"/>
    </marker>
    <style>
      .col-header { font-size: 14px; font-weight: 600; fill: #6e7681; text-anchor: middle; }
      .col-sub    { font-size: 11px; fill: #6e7681; text-anchor: middle; font-style: italic; }
      .item       { font-size: 11px; fill: #6e7681; text-anchor: middle; }
      .item-l     { font-size: 11px; fill: #6e7681; text-anchor: start; }
      .mono       { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; font-size: 11px; fill: #6e7681; text-anchor: middle; }
      .mono-l     { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; font-size: 11px; fill: #6e7681; text-anchor: start; }
      .stroke     { stroke: #6e7681; stroke-width: 1.2; fill: none; }
      .arrow      { stroke: #6e7681; stroke-width: 1.5; fill: none; }
      .arrow-fill { fill: #6e7681; }
    </style>
  </defs>

  <!-- ============= Header ============= -->
  <text x="600" y="34" class="col-header">Extension topology — core plus the eight named hooks</text>
  <text x="600" y="54" class="col-sub">all ten production bundles implement `get_skill_domains()`; the other hooks are optional and per-domain</text>

  <!-- ============= LEFT — Plan Marshall core ============= -->
  <rect class="stroke" x="60" y="100" width="320" height="430" rx="8" ry="8"/>

  <text x="220" y="128" class="col-header">Plan Marshall core</text>
  <text x="220" y="146" class="col-sub">always present; never extends itself</text>

  <text x="220" y="180" class="item">Orchestrator</text>
  <text x="220" y="196" class="mono">/plan-marshall</text>

  <text x="220" y="225" class="item">Six phase skills</text>
  <text x="220" y="241" class="mono">phase-1-init … phase-6-finalize</text>

  <text x="220" y="270" class="item">Dispatcher (canonical agent)</text>
  <text x="220" y="286" class="mono">execution-context-{level}</text>

  <text x="220" y="315" class="item">manage-* services</text>
  <text x="220" y="331" class="mono">status · tasks · findings · architecture …</text>

  <text x="220" y="360" class="item">Discovery + the seam</text>
  <text x="220" y="376" class="mono">extension_discovery.py</text>
  <text x="220" y="392" class="item">scans `plan-marshall-plugin/extension.py`</text>
  <text x="220" y="406" class="item">in every installed bundle</text>

  <text x="220" y="440" class="item">Required from every bundle:</text>
  <text x="220" y="458" class="mono" style="font-weight: 700">get_skill_domains()</text>
  <text x="220" y="475" class="item">the only abstract method</text>

  <text x="220" y="505" class="col-sub">all other hooks are optional</text>
  <text x="220" y="520" class="col-sub">— default to no-op when absent —</text>

  <!-- ============= Connector arrows from core to hooks ============= -->
  <!-- Three implicit arrows from core's right edge to the hook column area -->
  <line class="arrow" x1="385" y1="160" x2="490" y2="160" marker-end="url(#arrow)"/>
  <line class="arrow" x1="385" y1="315" x2="490" y2="315" marker-end="url(#arrow)"/>
  <line class="arrow" x1="385" y1="470" x2="490" y2="470" marker-end="url(#arrow)"/>

  <!-- ============= RIGHT — Eight extension hooks (4 × 2 grid) ============= -->
  <!-- Column 1 (x = 500-820), Column 2 (x = 840-1160). Card width 320, height 100, vertical gap 20. -->

  <!-- Row 1 -->
  <rect class="stroke" x="500" y="110" width="320" height="100" rx="6" ry="6"/>
  <text x="660" y="132" class="mono" style="font-weight: 700">ext-point-build</text>
  <text x="660" y="151" class="mono">discover_modules() + ExecuteConfig</text>
  <text x="660" y="170" class="col-sub">4 implementations · Active</text>
  <text x="660" y="190" class="item">Maven · Gradle · npm · Python</text>

  <rect class="stroke" x="840" y="110" width="320" height="100" rx="6" ry="6"/>
  <text x="1000" y="132" class="mono" style="font-weight: 700">ext-point-triage</text>
  <text x="1000" y="151" class="mono">provides_triage()</text>
  <text x="1000" y="170" class="col-sub">7 implementations · Active</text>
  <text x="1000" y="190" class="item">java · js · oci · python · docs · reqs · plugin</text>

  <!-- Row 2 -->
  <rect class="stroke" x="500" y="230" width="320" height="100" rx="6" ry="6"/>
  <text x="660" y="252" class="mono" style="font-weight: 700">ext-point-recipe</text>
  <text x="660" y="271" class="mono">provides_recipes()</text>
  <text x="660" y="290" class="col-sub">4 implementations · Active</text>
  <text x="660" y="310" class="item">refactor-to-profile · doc-verify · diagrams · cui-logging</text>

  <rect class="stroke" x="840" y="230" width="320" height="100" rx="6" ry="6"/>
  <text x="1000" y="252" class="mono" style="font-weight: 700">ext-point-outline</text>
  <text x="1000" y="271" class="mono">provides_outline_skill()</text>
  <text x="1000" y="290" class="col-sub">1 implementation · Active</text>
  <text x="1000" y="310" class="item">domain-specific outline + change-type routing</text>

  <!-- Row 3 -->
  <rect class="stroke" x="500" y="350" width="320" height="100" rx="6" ry="6"/>
  <text x="660" y="372" class="mono" style="font-weight: 700">ext-point-provider</text>
  <text x="660" y="391" class="mono">provides_providers()</text>
  <text x="660" y="410" class="col-sub">3 implementations · Active</text>
  <text x="660" y="430" class="item">credential providers (GitHub · GitLab · Sonar)</text>

  <rect class="stroke" x="840" y="350" width="320" height="100" rx="6" ry="6"/>
  <text x="1000" y="372" class="mono" style="font-weight: 700">ext-point-execution-context-workflow</text>
  <text x="1000" y="391" class="mono">declares: `implements:` in workflow doc</text>
  <text x="1000" y="410" class="col-sub">many · Active</text>
  <text x="1000" y="430" class="item">every workflow doc dispatched through `execution-context`</text>

  <!-- Row 4 -->
  <rect class="stroke" x="500" y="470" width="320" height="100" rx="6" ry="6"/>
  <text x="660" y="492" class="mono" style="font-weight: 700">ext-point-verify-steps</text>
  <text x="660" y="511" class="mono">provides_verify_steps()</text>
  <text x="660" y="530" class="col-sub">0 implementations · Placeholder</text>
  <text x="660" y="550" class="item">domain-specific phase-5 verification</text>

  <rect class="stroke" x="840" y="470" width="320" height="100" rx="6" ry="6"/>
  <text x="1000" y="492" class="mono" style="font-weight: 700">ext-point-finalize-steps</text>
  <text x="1000" y="511" class="mono">provides_finalize_steps()</text>
  <text x="1000" y="530" class="col-sub">0 implementations · Placeholder</text>
  <text x="1000" y="550" class="item">domain-specific phase-6 finalize hooks</text>

  <!-- ============= Footer caption ============= -->
  <text x="600" y="600" class="col-sub">Adding a domain: drop `skills/plan-marshall-plugin/extension.py` into the bundle, implement `get_skill_domains()`, optionally override any other hook.</text>

</svg>
