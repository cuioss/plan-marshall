<?xml version="1.0" encoding="UTF-8"?>
<!--
  Graph / topology diagram skeleton — asymmetric hub-and-spoke.

  theme-handling: A (theme-neutral)
  see  pm-documents:ref-svg-diagrams/standards/theme-handling.md

  Replace title/desc/hub label/spoke labels.
  Hub is the visually-heavier centre (stroke 1.6); primary node on the
  left, stack of secondary nodes on the right.
  See  pm-documents:ref-svg-diagrams/standards/diagram-type-graph.md
  for placement conventions and  visual-language.md  for palette /
  typography.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540"
     role="img" aria-labelledby="title desc"
     font-family="ui-sans-serif, -apple-system, system-ui, 'Segoe UI', sans-serif">
  <title id="title">PLACEHOLDER — one-sentence accessible name</title>
  <desc  id="desc">PLACEHOLDER — paragraph-length description of the topology and what the hub-and-spoke relationship means</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" class="arrow-fill"/>
    </marker>
    <style>
      .node-header  { font-size: 15px; font-weight: 600; fill: #6e7681; text-anchor: middle; }
      .node-sub     { font-size: 11px; fill: #6e7681; text-anchor: middle; font-style: italic; }
      .item-c       { font-size: 12px; fill: #6e7681; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; text-anchor: middle; }
      .edge-lbl     { font-size: 11px; fill: #6e7681; text-anchor: middle; font-style: italic; }
      .hub-stroke   { stroke: #6e7681; stroke-width: 1.6; fill: none; }
      .spoke-stroke { stroke: #6e7681; stroke-width: 1.2; fill: none; }
      .connector    { stroke: #6e7681; stroke-width: 1; fill: none; }
      .arrow        { stroke: #6e7681; stroke-width: 1.5; fill: none; }
      .arrow-fill   { fill: #6e7681; }
      .sep          { stroke: #6e7681; stroke-width: 0.6; stroke-dasharray: 3 3; }
      .caption      { font-size: 12px; fill: #6e7681; text-anchor: middle; font-style: italic; }
    </style>
  </defs>

  <!-- ============================================================ -->
  <!-- HUB — centred, thicker stroke, monospace contents             -->
  <!-- ============================================================ -->
  <rect class="hub-stroke" x="340" y="180" width="220" height="200" rx="8" ry="8"/>
  <text x="450" y="212" class="node-header">HUB</text>
  <text x="450" y="228" class="node-sub">what the hub stores</text>
  <line class="sep" x1="360" y1="246" x2="540" y2="246"/>
  <text x="450" y="276" class="item-c">content-item-1</text>
  <text x="450" y="298" class="item-c">content-item-2</text>
  <text x="450" y="320" class="item-c">content-item-3</text>
  <text x="450" y="342" class="item-c">content-item-4</text>

  <!-- ============================================================ -->
  <!-- PRIMARY NODE — on the left of the hub                         -->
  <!-- ============================================================ -->
  <rect class="spoke-stroke" x="60" y="220" width="200" height="120" rx="6" ry="6"/>
  <text x="160" y="252" class="node-header">PRIMARY</text>
  <text x="160" y="268" class="node-sub">the one of its kind</text>
  <text x="160" y="298" class="item-c">primary-detail-1</text>
  <text x="160" y="320" class="item-c">primary-detail-2</text>

  <!-- ============================================================ -->
  <!-- SECONDARY STACK — three nodes on the right                    -->
  <!-- ============================================================ -->
  <rect class="spoke-stroke" x="640" y="110" width="200" height="74" rx="6" ry="6"/>
  <text x="740" y="138" class="item-c">secondary-1</text>
  <text x="740" y="160" class="node-sub">label for secondary 1</text>

  <rect class="spoke-stroke" x="640" y="206" width="200" height="74" rx="6" ry="6"/>
  <text x="740" y="234" class="item-c">secondary-2</text>
  <text x="740" y="256" class="node-sub">label for secondary 2</text>

  <rect class="spoke-stroke" x="640" y="302" width="200" height="74" rx="6" ry="6"/>
  <text x="740" y="330" class="item-c">secondary-3</text>
  <text x="740" y="352" class="node-sub">label for secondary 3</text>

  <!-- ============================================================ -->
  <!-- CONNECTORS                                                    -->
  <!--   primary <-> hub uses directional arrows (writes / reads)    -->
  <!--   hub --> secondary stack uses unlabelled connectors          -->
  <!-- ============================================================ -->

  <!-- primary -> hub (write) -->
  <line class="arrow" x1="260" y1="270" x2="338" y2="270" marker-end="url(#arrow)"/>
  <text x="299" y="262" class="edge-lbl">writes</text>
  <!-- hub -> primary (read) -->
  <line class="arrow" x1="338" y1="298" x2="260" y2="298" marker-end="url(#arrow)"/>
  <text x="299" y="290" class="edge-lbl">reads</text>

  <!-- hub -> secondary-1 (no arrow; structural connector only) -->
  <line class="connector" x1="560" y1="220" x2="638" y2="147"/>
  <!-- hub -> secondary-2 (no arrow) -->
  <line class="connector" x1="562" y1="280" x2="638" y2="243"/>
  <!-- hub -> secondary-3 (no arrow) -->
  <line class="connector" x1="560" y1="340" x2="638" y2="339"/>

  <!-- ============================================================ -->
  <!-- Footer caption                                                -->
  <!-- ============================================================ -->
  <text x="450" y="490" class="caption">Hub-and-spoke: one central thing, N peripheral things that relate to it.</text>

</svg>
