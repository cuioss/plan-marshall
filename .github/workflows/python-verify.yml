name: Python Verify

on:
  push:
    branches: [main, "feature/*", "fix/*", "chore/*", "dependabot/**"]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read
  pull-requests: read

jobs:
  verify:
    uses: cuioss/cuioss-organization/.github/workflows/reusable-pyprojectx-verify.yml@9ea25d1cc6599d24a0f2333330b112c627f58688 # v0.9.0
