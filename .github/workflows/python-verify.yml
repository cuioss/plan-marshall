name: Python Verify

on:
  push:
    branches: [main, "feature/*", "fix/*", "chore/*", "dependabot/**"]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read
  pull-requests: read

jobs:
  verify:
    uses: cuioss/cuioss-organization/.github/workflows/reusable-pyprojectx-verify.yml@05fe424dc32f31daa2fc369fb52ca360d84a62f4 # v0.11.1
